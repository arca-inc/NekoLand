name: Release Bundles

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build pkg-config libgtk-4-dev libwayland-dev wayland-protocols libpango1.0-dev libcairo2-dev libglib2.0-dev libdbus-1-dev
          git clone https://github.com/wmww/gtk4-layer-shell.git
          cd gtk4-layer-shell
          meson setup -Dintrospection=false -Dvapi=false build
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Create Bundle
        run: |
          mkdir -p bundle-linux/assets
          cp -r assets/* bundle-linux/assets/
          cp target/release/nekoland bundle-linux/
          cp install.sh bundle-linux/
          tar -czvf nekoland-linux.tar.gz -C bundle-linux .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nekoland-linux
          path: nekoland-linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust (GNU)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Setup MSYS2 and GTK4
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gtk4 mingw-w64-x86_64-pkgconf mingw-w64-x86_64-gcc

      # The build will likely fail here because gtk4-layer-shell relies on Wayland headers.
      # Setting continue-on-error to true so it doesn't break the whole pipeline while Windows support is a WIP.
      - name: Build
        id: build
        shell: msys2 {0}
        run: |
          export PATH="/c/Users/runneradmin/.cargo/bin:$PATH"
          export PKG_CONFIG_ALLOW_CROSS=1
          cargo build --release --target x86_64-pc-windows-gnu

      # Assemble un bundle autonome : l'exe + TOUTES les DLL GTK4/GLib dont il
      # dépend (sinon « libcairo-2.dll introuvable » etc. sur une machine sans
      # MSYS2), plus le runtime GTK (loaders gdk-pixbuf, schémas GLib, icônes).
      # La structure prefix (exe + DLL à la racine, lib/ et share/ en frères)
      # permet à GLib/GTK de retrouver ses données relativement à l'exe sur Windows.
      - name: Assemble Bundle (exe + GTK runtime)
        if: steps.build.outcome == 'success'
        shell: msys2 {0}
        run: |
          set -e
          mkdir -p bundle-windows/assets
          cp -r assets/* bundle-windows/assets/
          cp target/x86_64-pc-windows-gnu/release/nekoland.exe bundle-windows/

          # DLL mingw64 dont dépend l'exe (résolution transitive via ldd).
          ldd bundle-windows/nekoland.exe | grep -i '/mingw64/bin/' | awk '{print $3}' | sort -u \
            | while read -r dll; do cp -u "$dll" bundle-windows/; done

          # Loaders gdk-pixbuf (chargement des PNG des sprites) + cache en chemins relatifs.
          mkdir -p bundle-windows/lib/gdk-pixbuf-2.0/2.10.0
          cp -r /mingw64/lib/gdk-pixbuf-2.0/2.10.0/loaders bundle-windows/lib/gdk-pixbuf-2.0/2.10.0/
          ( cd bundle-windows/lib/gdk-pixbuf-2.0/2.10.0 && gdk-pixbuf-query-loaders loaders/*.dll > loaders.cache )
          # Les loaders peuvent eux-mêmes dépendre de DLL (libpng, jpeg…) : on les ajoute.
          for l in bundle-windows/lib/gdk-pixbuf-2.0/2.10.0/loaders/*.dll; do
            ldd "$l" | grep -i '/mingw64/bin/' | awk '{print $3}'; done | sort -u \
            | while read -r dll; do cp -u "$dll" bundle-windows/; done

          # Schémas GLib (compilés).
          mkdir -p bundle-windows/share/glib-2.0/schemas
          glib-compile-schemas /mingw64/share/glib-2.0/schemas --targetdir bundle-windows/share/glib-2.0/schemas

          # Icônes (thème par défaut GTK).
          mkdir -p bundle-windows/share/icons
          cp -r /mingw64/share/icons/Adwaita bundle-windows/share/icons/ || true
          cp -r /mingw64/share/icons/hicolor bundle-windows/share/icons/ || true

      - name: Zip Bundle
        if: steps.build.outcome == 'success'
        run: Compress-Archive -Path bundle-windows/* -DestinationPath nekoland-windows.zip

      - name: Upload Artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: nekoland-windows
          path: nekoland-windows.zip

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13   # runner Intel  → binaire x86_64
            arch: x86_64
          - runner: macos-14   # runner Apple Silicon → binaire arm64
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install gtk4 pkgconfig

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        id: build
        run: cargo build --release

      - name: Create Bundle
        if: steps.build.outcome == 'success'
        run: |
          mkdir -p bundle-macos/assets
          cp -r assets/* bundle-macos/assets/
          cp target/release/nekoland bundle-macos/
          tar -czvf nekoland-macos-${{ matrix.arch }}.tar.gz -C bundle-macos .

      - name: Upload Artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: nekoland-macos-${{ matrix.arch }}
          path: nekoland-macos-${{ matrix.arch }}.tar.gz

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short sha
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: nekoland-linux
          path: release-assets
        continue-on-error: true

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: nekoland-windows
          path: release-assets
        continue-on-error: true

      - name: Download macOS Artifacts (x86_64 + arm64)
        uses: actions/download-artifact@v4
        with:
          pattern: nekoland-macos-*
          merge-multiple: true
          path: release-assets
        continue-on-error: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.sha_short }}
          name: Build ${{ steps.vars.outputs.sha_short }}
          files: release-assets/*
